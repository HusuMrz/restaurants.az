
<!DOCTYPE html>
<html lang="az">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Qeydiyyat | MyRestaurants
  </title>

  <link
    rel="stylesheet"
    href="index.css"
  >

</head>

<body>

<header class="header">

  <div class="container">

    <a
      href="index.html"
      class="logo"
    >

      <img
        src="image/Brown and Maroon Minimalist Catering Logo .png"
        alt="logo"
      >

    </a>

    <nav class="navbar">

      <a href="index.html">
        Ana səhifə
      </a>

      <a href="login.html">
        Giriş
      </a>

    </nav>

  </div>

</header>

<section class="auth-section">

  <form
    class="auth-box"
    id="registerForm"
  >

    <h2>
      Qeydiyyat
    </h2>

    <input
      type="text"
      id="registerName"
      placeholder="Ad"
      required
    >

    <input
      type="email"
      id="registerEmail"
      placeholder="Email"
      required
    >

    <input
      type="password"
      id="registerPassword"
      placeholder="Şifrə"
      required
    >

    <button
      type="submit"
      id="registerBtn"
    >

      Qeydiyyatdan keç

    </button>

    <p>

      Hesabın var?

      <a href="login.html">

        Giriş et

      </a>

    </p>

  </form>

</section>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="index.js"></script>

</body>

</html>
