<!DOCTYPE html>
<html lang="az">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Giriş | MyRestaurants
  </title>

  <link
    rel="stylesheet"
    href="index.css"
  >

</head>

<body>

<header class="header">

  <div class="container">

    <a
      href="index.html"
      class="logo"
    >

      <img
        src="image/Brown and Maroon Minimalist Catering Logo .png"
        alt="logo"
      >

    </a>

    <nav class="navbar">

      <a href="index.html">
        Ana səhifə
      </a>

      <a href="register.html">
        Qeydiyyat
      </a>

    </nav>

  </div>

</header>

<section class="auth-section">

  <div class="auth-box">

    <h2>
      Giriş
    </h2>

    <input
      type="email"
      id="loginEmail"
      placeholder="Email"
    >

    <input
      type="password"
      id="loginPassword"
      placeholder="Şifrə"
    >

    <button
      type="button"
      id="loginBtn"
    >

      Giriş et

    </button>

    <p>

      Hesabın yoxdur?

      <a href="register.html">

        Qeydiyyatdan keç

      </a>

    </p>

  </div>

</section>

<script src="index.js"></script>

</body>

</html>
